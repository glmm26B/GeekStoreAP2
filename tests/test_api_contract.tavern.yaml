---
test_name: Contrato da API GET /produtos

stages:
  - name: "GET /produtos retorna status 200"
    request:
      url: "http://127.0.0.1:5000/produtos"
      method: GET
    response:
      status_code: 200
      verify_response_with:
        function: tests.tavern_helpers:verificar_lista_nao_vazia

  - name: "Produto tem chaves id, nome, preco e estoque"
    request:
      url: "http://127.0.0.1:5000/produtos/1"
      method: GET
    response:
      status_code: 200
      json:
        id: !anyint
        nome: !anystr
        preco: !anyfloat
        estoque: !anyint

---
test_name: Contrato da API GET /produtos/:id inexistente

stages:
  - name: "Produto inexistente retorna 404"
    request:
      url: "http://127.0.0.1:5000/produtos/9999"
      method: GET
    response:
      status_code: 404
      json:
        erro: !anystr
